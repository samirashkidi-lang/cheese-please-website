<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bar Ten Admin — Login</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body class="login-page">

<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">🧀</div>
      <div class="login-logo-name">Bar Ten &amp; Cheese Please</div>
      <div class="login-logo-sub">Admin Dashboard</div>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required>
      </div>
      <div class="login-error" id="loginError"></div>
      <button type="submit" class="btn-login">Sign In →</button>
    </form>
  </div>
</div>

<script>
  // Simple auth — replace with Supabase auth later
  const ADMIN_USERS = [
    { email: 'sam@bartentampa.com',         password: 'bartenAdmin2024' },
    { email: 'cheesepleasetampa@gmail.com', password: 'bartenAdmin2024' },
    { email: 'samirashkidi@gmail.com',       password: 'bartenAdmin2024' },
  ];

  document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim().toLowerCase();
    const pass  = document.getElementById('loginPassword').value;
    const match = ADMIN_USERS.find(u => u.email === email && u.password === pass);
    if (match) {
      sessionStorage.setItem('admin_user', email);
      window.location.href = 'dashboard.html';
    } else {
      document.getElementById('loginError').textContent = 'Invalid email or password.';
    }
  });

  // Already logged in?
  if (sessionStorage.getItem('admin_user')) window.location.href = 'dashboard.html';
</script>
</body>
</html>
